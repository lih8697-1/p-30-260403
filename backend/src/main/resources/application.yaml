spring:
  application:
    name: p-24-260305

  profiles:
    active: dev

  output:
    ansi:
      enabled: always

  thymeleaf:
    cache: false
    prefix: file:src/main/resources/templates/

  mvc:
    hiddenmethod:
      filter:
        enabled: true
  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: update
    show-sql: true

springdoc:
  default-produces-media-type: application/json; charset=UTF-8

logging:
  level:
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    org.springframework.transaction.interceptor: TRACE
    com.back: INFO
#  레벨명	숫자	설명
#  TRACE	 0	    가장 상세한 로그, 디버깅용
#  DEBUG	 1	    개발/디버깅용, 상세 정보
#  INFO	     2	    디폴트, 일반적인 정보, 서비스 상태
#  WARN	     3	    경고, 문제 가능성 있음
#  ERROR	 4	    에러, 예외 발생
#  FATAL	 5	    치명적 에러, 시스템 중단 가능


# 사용자 정의 설정 변수
custom:
  jwt:
    secretPattern: abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz1234567890
    expiration: "#{15 * 60}" # 초 단위
#    expiration: "#{1000L * 60 * 60 * 24 * 365}" # 1시간(ms 단위)
